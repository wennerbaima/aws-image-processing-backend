name: Deploy Backend Lambdas

on:
  push:
    branches:
      - main

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      ####################################
      # generate-upload-url
      ####################################

      - name: Package generate-upload-url
        run: |
          cd lambdas/generate-upload-url
          zip -r generate-upload-url.zip .

      - name: Deploy generate-upload-url
        run: |
          aws lambda update-function-code \
            --function-name generate-upload-url \
            --zip-file fileb://lambdas/generate-upload-url/generate-upload-url.zip

      ####################################
      # image-processor
      ####################################

      - name: Package image-processor
        run: |
          cd lambdas/image-processor
          zip -r image-processor.zip .

      - name: Deploy image-processor
        run: |
          aws lambda update-function-code \
            --function-name image-processor \
            --zip-file fileb://lambdas/image-processor/image-processor.zip